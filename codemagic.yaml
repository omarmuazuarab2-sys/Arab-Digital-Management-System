workflows:
  professional-build:
    name: Arab Digital Management Professional Build
    max_build_duration: 60
    environment:
      groups:
        - ARAB  # Wannan rukunin da ka ƙirƙira a Codemagic
      vars:
        NODE_ENV: 'production'
    trigger:
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Run build
        script: |
          npm run build
      - name: Run security check
        script: |
          npm audit
    artifacts:
      - build/  # Wannan folder din da ake fitarwa bayan ginin ya kammala
      
