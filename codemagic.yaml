workflows:
  professional-build:
    name: Arab Digital Management Professional Build
    max_build_duration: 60
    environment:
      groups:
        - ARAB
      vars:
        NODE_ENV: 'production'
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Run build
        script: |
          npm run build
      - name: Run security check
        script: |
          npm audit
          
